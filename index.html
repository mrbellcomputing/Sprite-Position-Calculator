<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Position Calculator</title>
<style>
body{font-family:Verdana,Arial,sans-serif;background:#E0E0E0;color:#222;padding:20px;line-height:1.5}
.container{width:fit-content;margin:auto;background:white;padding:20px;border-radius:15px;box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative}
.browser-button{position:absolute;top:20px;left:20px;background:#333;color:#fff;border-radius:8px;padding:10px 14px;font-size:14px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}
.browser-button:hover{background:#555}
h1{text-align:center;color:#333;font-size:30px;margin-bottom:15px}
.main-layout{display:flex;gap:40px;align-items:flex-start}
.right-panel{display:flex;flex-direction:column;gap:18px;margin-top:70px;min-width:260px;padding-right:20px}
label{font-weight:bold;font-size:16px;width:120px}
.purple-label{color:#b66ad6}
.control-group{display:flex;align-items:center;gap:10px}
input{width:100px;padding:8px;font-size:16px}
.output{margin-top:25px;padding:15px;background:#f0f0f0;border-radius:10px}
.block-output{display:inline-flex;flex-wrap:wrap;gap:4px;background:#b66ad6;padding:8px 10px;border-radius:8px;font-family:Consolas,monospace}
.var-name{background:white;padding:2px 6px;border-radius:6px}
.function-block{background:#ff8f8f;padding:3px 6px;border-radius:6px}
.number-block{background:#ffe2e2;padding:1px 4px;border-radius:5px}
.grid{position:relative;width:400px;height:400px;border:4px solid #333;background:white;
background-image:linear-gradient(to right,#DDDDDD 1px,transparent 1px),linear-gradient(to bottom,#DDDDDD 1px,transparent 1px);
background-size:50px 50px;cursor:crosshair}
.marker{position:absolute;width:12px;height:12px;background:#b66ad6;border:2px solid white;border-radius:50%;transform:translate(-50%,-50%);display:none}
</style>
</head>
<body>
<div class="container">
<a class="browser-button" href="https://mrbellcomputing.github.io/Sprite-Position-Calculator/" target="_blank">Open in Browser</a>
<h1>Sprite Position Calculator</h1>

<div class="block-output">
var <span class="var-name">cube</span> =
<span class="function-block">createSprite(<span class="number-block">X</span>, <span class="number-block">Y</span>, <span class="number-block">width</span>, <span class="number-block">height</span>)</span>;
</div>

<div class="main-layout">
<div>
<p><strong>Click anywhere on the 400 × 400 Game Lab grid:</strong></p>
<div class="grid" id="gameGrid"><div class="marker" id="marker"></div></div>
</div>

<div class="right-panel">
<div class="control-group"><label>Sprite Name</label><input type="text" id="spriteName" value="cube"></div>
<div class="control-group"><label class="purple-label">Top Left X</label><input type="number" id="topLeftX" value="200" step="1"></div>
<div class="control-group"><label class="purple-label">Top Left Y</label><input type="number" id="topLeftY" value="100" step="1"></div>
<div class="control-group"><label>Width</label><input type="number" id="width" value="50" step="5"></div>
<div class="control-group"><label>Height</label><input type="number" id="height" value="50" step="10"></div>
</div>
</div>

<div class="output">
<p><strong>Your coordinates and size requirements are :</strong></p>
<div class="block-output" id="codeOutput"></div>
</div>
</div>

<script>
function calculateSprite(){
let spriteName=document.getElementById("spriteName").value||"cube";
let x=Number(document.getElementById("topLeftX").value||0);
let y=Number(document.getElementById("topLeftY").value||0);
let width=Number(document.getElementById("width").value||0);
let height=Number(document.getElementById("height").value||0);
let centreX=x+(width/2);
let centreY=y+(height/2);
document.getElementById("codeOutput").innerHTML="var <span class='var-name'>"+spriteName+"</span> = <span class='function-block'>createSprite(<span class='number-block'>"+centreX+"</span>, <span class='number-block'>"+centreY+"</span>, <span class='number-block'>"+width+"</span>, <span class='number-block'>"+height+"</span>)</span>;";
}
function gridClicked(event){
const grid=document.getElementById("gameGrid");
const rect=grid.getBoundingClientRect();
const x=Math.round(event.clientX-rect.left);
const y=Math.round(event.clientY-rect.top);
document.getElementById("topLeftX").value=x;
document.getElementById("topLeftY").value=y;
const marker=document.getElementById("marker");
marker.style.left=x+"px";
marker.style.top=y+"px";
marker.style.display="block";
calculateSprite();
}
document.getElementById("gameGrid").addEventListener("click",gridClicked);
["spriteName","topLeftX","topLeftY","width","height"].forEach(id=>{
document.getElementById(id).addEventListener("input",calculateSprite);
});
calculateSprite();
</script>
</body>
</html>
